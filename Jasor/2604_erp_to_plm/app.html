<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP → PLM 转换（浏览器版）</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>ERP → PLM 转换</h1>
      <p class="hint">
        本地浏览器处理：页面会自动读取当前目录下的 <code>head.xlsx</code> 作为表头模板。请选择待转换 ERP 表（首行表头，从第 2 行起读取 C、O、P 列）。转换规则与 <code>2604_erp_to_plm.py</code> 对齐。
      </p>
      <section class="card">
        <h2>1. ERP 输入表</h2>
        <label class="file">
          <input type="file" id="inputFile" accept=".xlsx,.xlsm,.xls,.csv" onchange="document.getElementById('inputLabel').textContent = (this.files && this.files[0]) ? this.files[0].name : '未选择文件';" />
          <span id="inputLabel">未选择文件</span>
        </label>
      </section>

      <section class="card actions">
        <button type="button" id="btnConvert" class="primary">开始转换并下载</button>
        <p id="status" class="status" role="status"></p>
      </section>
    </main>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="app.js?v=20260413-2"></script>
  </body>
</html>
