<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLM 表检测（B/AA）</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>2604 PLM 表检测（B/AA）</h1>
      <p class="hint">
        先选择一个检测数据表，再选择总数据来源（总数据文件夹或总数据文件二选一）。程序会扫描总数据中的所有 Sheet，按 B 列查重，并比较 AA 列是否一致。
      </p>
      <section class="card">
        <h2>1. 选择检测数据表</h2>
        <div class="pickerRow">
          <button type="button" id="btnPickCheckFile" class="secondary">确认选择检测表</button>
          <span id="checkFileLabel">未选择文件</span>
        </div>
      </section>
      <section class="card">
        <h2>2. 选择总数据文件夹</h2>
        <div class="pickerRow">
          <button type="button" id="btnPickTotalFolder" class="secondary">确认选择总数据文件夹</button>
          <span id="totalFolderLabel">未选择文件夹</span>
        </div>
      </section>
      <section class="card">
        <h2>3. 选择总数据文件（与文件夹二选一）</h2>
        <div class="pickerRow">
          <button type="button" id="btnPickTotalFile" class="secondary">确认选择总数据文件</button>
          <input type="file" id="totalFileInput" class="hiddenInput" accept=".xlsx,.xlsm,.xls,.csv" />
          <span id="totalFileLabel">未选择文件</span>
        </div>
      </section>
      <section class="card actions">
        <button type="button" id="btnCheck" class="primary">开始检测</button>
        <p id="status" class="status" role="status"></p>
      </section>
      <section class="card">
        <h2>检测输出</h2>
        <pre id="result" class="result">等待执行检测...</pre>
      </section>
    </main>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
